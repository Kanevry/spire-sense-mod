name: Build SpireSense Mod

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Tests run without Godot SDK — source-file linking compiles models directly
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore test dependencies
        run: dotnet restore SpireSenseMod.Tests/SpireSenseMod.Tests.csproj

      - name: Build tests
        run: dotnet build SpireSenseMod.Tests/SpireSenseMod.Tests.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test SpireSenseMod.Tests/SpireSenseMod.Tests.csproj --configuration Release --no-build --verbosity normal

  # Main build requires Godot.NET.Sdk (resolved from nuget.org)
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore SpireSenseMod/SpireSenseMod.csproj

      - name: Check formatting
        run: dotnet format SpireSenseMod/SpireSenseMod.csproj --verify-no-changes

      - name: Build (Release, warnings as errors)
        run: dotnet build SpireSenseMod/SpireSenseMod.csproj --configuration Release /p:TreatWarningsAsErrors=true --no-restore

      - name: Verify mod manifest
        run: |
          if [ ! -f SpireSenseMod/mod_manifest.json ]; then
            echo "ERROR: mod_manifest.json not found"
            exit 1
          fi
          echo "Mod manifest found:"
          cat SpireSenseMod/mod_manifest.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpireSenseMod
          path: |
            SpireSenseMod/bin/Release/net9.0/SpireSenseMod.dll
            SpireSenseMod/mod_manifest.json

  # Release on version tags
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: SpireSenseMod
          path: artifact/

      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        run: |
          mkdir -p SpireSense
          cp artifact/SpireSenseMod/bin/Release/net9.0/SpireSenseMod.dll SpireSense/
          cp artifact/mod_manifest.json SpireSense/
          zip -r "SpireSense-${{ steps.version.outputs.tag }}.zip" SpireSense/

      - name: Generate checksums
        run: sha256sum "SpireSense-${{ steps.version.outputs.tag }}.zip" > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SpireSense-${{ steps.version.outputs.tag }}.zip
            checksums.txt
          generate_release_notes: true

name: Build SpireSense Mod

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore SpireSenseMod/SpireSenseMod.csproj

      - name: Check formatting
        run: dotnet format --verify-no-changes SpireSenseMod/SpireSenseMod.csproj

      - name: Build
        run: dotnet build -c Release /p:TreatWarningsAsErrors=true SpireSenseMod/SpireSenseMod.csproj --no-restore

      - name: Test
        if: hashFiles('SpireSenseMod.Tests/SpireSenseMod.Tests.csproj') != ''
        run: dotnet test SpireSenseMod.Tests/SpireSenseMod.Tests.csproj --configuration Release --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SpireSenseMod
          path: |
            SpireSenseMod/bin/Release/net9.0/SpireSenseMod.dll
            SpireSenseMod/mod_manifest.json

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: SpireSenseMod
          path: artifact/

      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        run: |
          mkdir -p SpireSense
          cp artifact/SpireSenseMod/bin/Release/net9.0/SpireSenseMod.dll SpireSense/
          cp artifact/SpireSenseMod/mod_manifest.json SpireSense/
          zip -r "SpireSense-${{ steps.version.outputs.tag }}.zip" SpireSense/

      - name: Generate checksums
        run: sha256sum SpireSense-${{ steps.version.outputs.tag }}.zip > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SpireSense-${{ steps.version.outputs.tag }}.zip
            checksums.txt
          generate_release_notes: true
